<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#1f1f2e;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.calculator{
    width:340px;
    background:#2d2d44;
    padding:20px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.4);
}

#display{
    width:100%;
    height:70px;
    border:none;
    border-radius:12px;
    background:#111;
    color:#00ff99;
    font-size:32px;
    text-align:right;
    padding:15px;
    margin-bottom:20px;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

button{
    height:65px;
    border:none;
    border-radius:12px;
    font-size:22px;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    transform:scale(1.05);
}

.number{
    background:#444;
    color:white;
}

.operator{
    background:#ff9800;
    color:white;
}

.clear{
    background:#e53935;
    color:white;
}

.equal{
    background:#00c853;
    color:white;
    grid-column:span 2;
}
</style>

</head>
<body>

<div class="calculator">
    <input type="text" id="display" readonly>

    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">Ce</button>
        <button class="operator" onclick="append('/')">÷</button>
        <button class="operator" onclick="append('*')">×</button>
        <button class="operator" onclick="backspace()">De</button>

        <button class="number" onclick="append('7')">7</button>
        <button class="number" onclick="append('8')">8</button>
        <button class="number" onclick="append('9')">9</button>
        <button class="operator" onclick="append('-')">-</button>

        <button class="number" onclick="append('4')">4</button>
        <button class="number" onclick="append('5')">5</button>
        <button class="number" onclick="append('6')">6</button>
        <button class="operator" onclick="append('+')">+</button>

        <button class="number" onclick="append('1')">1</button>
        <button class="number" onclick="append('2')">2</button>
        <button class="number" onclick="append('3')">3</button>
        <button class="operator" onclick="append('.')">.</button>

        <button class="number" onclick="append('0')">0</button>
        <button class="equal" onclick="calculate()">=</button>
    </div>
</div>

<script>
const display = document.getElementById("display");

function append(value){
    display.value += value;
}

function clearDisplay(){
    display.value = "";
}

function backspace(){
    display.value = display.value.slice(0,-1);
}

function calculate(){
    try{
        display.value = eval(display.value);
    }catch{
        display.value = "Error";
    }
}
</script>

</body>
</html>

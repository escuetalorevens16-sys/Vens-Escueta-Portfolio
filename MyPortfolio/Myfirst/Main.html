<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<style>

    body {
            margin:0;
            overflow:hidden;
            font-family: sans-serif;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:#ffbce1;
        }

    header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: #ff5eaf;
            padding: 10px;
            text-align: center;
        }

    header h1 {
            margin: 0;
            color: rgb(0, 0, 0);
            font-size: 24px;
            font-weight: bold;
            font-family: sans-serif;
        }

    .card {
            background-color: #dfdfdf;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 20px;
            margin: 20px;
            text-align: center;
        }
    
    h1 {
            color: rgb(0, 0, 0);
            font-size: 24px;
            font-weight: bold;
            font-family: sans-serif;
        }

    #general {
            color: antiquewhite;
            background-color: #00b427;
        }

    button {
        padding:15px 35px;
        font-size:20px;
        border:none;
        border-radius:10px;
        cursor:pointer;
        margin:10px;
         }

</style>


<body>

    <header>
        <h1>❤️Games for my baby❤️</h1>
    </header>

    <div id="card" class="card">

        <h1 id="h1">Game 1</h1>
        <p>Trap game</p>
        <button id="general" onclick="window.location.href='Game1.html'">Click Me</button>

    </div>

    <div id="card" class="card">

        <h1 id="h1">Game 2</h1>
        <p>Dino Game</p>
        <button id="general" onclick="window.location.href='Game2.html'">Click Me</button>

    </div>


</body>
</html>

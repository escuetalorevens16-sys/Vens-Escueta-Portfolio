<body>


<div id="card" class="card">
    <button id="general" onclick="window.location.href='Game1(2ndpage).html'"> Dont click me </button>

    <p style="font-size:20px; color:rgb(235, 68, 171);">For practice purposes only!</p>

  
    <h1>Do you want to proceed? 😊</h1>

    <button id="general" onclick="window.location.href='Game1(1stpage).html'"> Yes 😊 </button>
    <button id="No"> No 😭 </button>

</div>

<script>
const noButton = document.getElementById("No");

// Move the button to a random position
function moveButton() {
    const maxX = window.innerWidth - noButton.offsetWidth;
    const maxY = window.innerHeight - noButton.offsetHeight;

    const randomX = Math.random() * maxX;
    const randomY = Math.random() * maxY;

    noButton.style.left = randomX + "px";
    noButton.style.top = randomY + "px";
}

// Move when the mouse gets close
noButton.addEventListener("mouseenter", moveButton);

// Extra protection for touch devices
noButton.addEventListener("touchstart", function(e) {
    e.preventDefault();
    moveButton();
});

// If someone somehow clicks it anyway
noButton.addEventListener("click", function(e) {
    e.preventDefault();
    moveButton();
});
</script>
